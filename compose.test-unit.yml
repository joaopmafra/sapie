name: sapie-test-unit

services:
  firebase-test-emulator:
    build:
      context: .
      dockerfile: Dockerfile.firebase-emulators
    container_name: sapie-firebase-test-emulator
    working_dir: /srv/firebase
    # Host firebase.test-unit.json is mounted as firebase.json (CLI default config path).
    command:
      [
        "firebase",
        "emulators:start",
        "--project",
        "demo-test-unit",
        "--only",
        "auth,firestore,ui",
      ]
    ports:
      # Firestore HTTP (must match emulators.firestore.port in the mounted test-unit config)
      - "8181:8181"
      # Firestore WebSocket (UI + requests tab; emulators.firestore.websocketPort).
      # Use 9160 here so the default dev websocket (9150) can run on the host in parallel.
      - "9160:9160"
      # Auth (must match emulators.auth.port). Deliberately not 9099/9199 so local-dev defaults can run in parallel.
      - "9098:9098"
      # Emulator UI (must match emulators.ui.port)
      - "4001:4001"
      # Emulator Hub (browser/UI discover emulators; emulators.hub.port)
      - "4410:4410"
      # Logging service (emulators.logging.port)
      - "4510:4510"
    volumes:
      - ./.firebaserc:/srv/firebase/.firebaserc:ro
      - ./firebase.test-unit.json:/srv/firebase/firebase.json:ro
      - ./firebase/emulator-cache:/root/.cache/firebase/emulators
    tmpfs:
      - /srv/firebase/firestore-data
    restart: unless-stopped
