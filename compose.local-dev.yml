# Local hybrid dev: Auth + Firestore + Storage + UI, default host ports (see firebase.local-dev.json).
# ./firebase/data-local-dev is bind-mounted (tracked via .gitkeep). Empty dir: CLI skips import with a warning.
name: sapie-local-dev

services:
  firebase-local-dev-emulator:
    build:
      context: .
      dockerfile: Dockerfile.firebase-emulators
    container_name: sapie-firebase-local-dev
    working_dir: /srv/firebase
    command:
      [
        "firebase",
        "emulators:start",
        "--project",
        "local-dev",
        "--only",
        "auth,firestore,storage,ui",
        "--import",
        "/srv/firebase/data-local-dev",
        "--export-on-exit",
        "/srv/firebase/data-local-dev",
      ]
    ports:
      - "4000:4000"
      - "4400:4400"
      - "4500:4500"
      - "8080:8080"
      - "9099:9099"
      - "9150:9150"
      - "9199:9199"
    volumes:
      - ./.firebaserc:/srv/firebase/.firebaserc:ro
      - ./firebase.local-dev.json:/srv/firebase/firebase.json:ro
      - ./firebase/data-local-dev:/srv/firebase/data-local-dev
      - ./firebase/emulator-cache:/root/.cache/firebase/emulators
    restart: unless-stopped
